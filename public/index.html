<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Habit Terminal</title>
    <meta name="theme-color" content="#f4f7f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Habit Terminal" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="header-copy">
          <div id="header-kicker" class="header-kicker">Today</div>
          <h1 id="header-title">Good day</h1>
          <p id="header-subtitle" class="header-subtitle">
            A calm place to keep your habits moving.
          </p>
        </div>
      </header>

      <section id="today-view" class="screen-view"></section>
      <section id="insights-view" class="screen-view" hidden></section>
      <section id="habit-detail-view" class="screen-view" hidden></section>

      <button
        id="floating-add-button"
        class="floating-add-button"
        type="button"
        aria-label="Add habit"
      >
        <span class="floating-add-plus">+</span>
      </button>

      <nav class="bottom-nav" aria-label="Primary">
        <button class="bottom-nav-item is-active" data-nav-view="today" type="button">
          <span class="bottom-nav-icon">◉</span>
          <span>Today</span>
        </button>
        <button class="bottom-nav-item" data-nav-view="insights" type="button">
          <span class="bottom-nav-icon">◌</span>
          <span>Insights</span>
        </button>
      </nav>
    </main>

    <section id="composer-modal" class="composer-modal" hidden>
      <div id="composer-backdrop" class="composer-backdrop"></div>
      <div class="composer-sheet" role="dialog" aria-modal="true" aria-labelledby="composer-title">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="composer-sheet-header">
          <h2 id="composer-title">Create Habit</h2>
        </div>
        <form id="habit-form" class="composer-form">
          <div id="habit-title-field" class="form-field" hidden>
            <label class="field-label" for="habit-title-input">Title</label>
            <input id="habit-title-input" class="text-input" type="text" maxlength="120" />
          </div>
          <label class="sr-only" for="habit-input">Habit description</label>
          <textarea
            id="habit-input"
            rows="4"
            placeholder="Try: Walk for 30 minutes every weekday morning"
          ></textarea>
          <div class="composer-actions">
            <button id="habit-submit-button" type="submit" class="primary-button">Infer and create habit</button>
            <p id="composer-feedback" class="composer-feedback" hidden></p>
          </div>
        </form>
      </div>
    </section>

    <section id="log-sheet-modal" class="composer-modal" hidden>
      <div id="log-sheet-backdrop" class="composer-backdrop"></div>
      <div class="composer-sheet log-sheet" role="dialog" aria-modal="true" aria-labelledby="log-sheet-title">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="composer-sheet-header">
          <div>
            <h2 id="log-sheet-title">Log day</h2>
            <p id="log-sheet-subtitle" class="composer-feedback"></p>
          </div>
        </div>
        <div class="composer-form log-sheet-actions">
          <button id="log-sheet-done" type="button" class="action-button done-button">Mark done</button>
          <button id="log-sheet-skip" type="button" class="action-button skip-button">Mark skipped</button>
          <button id="log-sheet-clear" type="button" class="action-button">Clear log</button>
          <button id="log-sheet-cancel" type="button" class="action-button">Cancel</button>
        </div>
      </div>
    </section>

    <template id="today-card-template">
      <article class="today-card">
        <div class="swipe-actions" aria-hidden="true">
          <div class="swipe-action swipe-action-done">
            <span class="swipe-action-icon">✓</span>
          </div>
          <div class="swipe-action swipe-action-skip">
            <span class="swipe-action-icon">↷</span>
          </div>
        </div>
        <div class="today-card-content">
          <div class="today-card-top">
            <div>
              <h2 class="today-card-title"></h2>
              <p class="today-card-meta"></p>
            </div>
          </div>
          <div class="progress-row">
            <div class="progress-copy">
              <span class="progress-label progress-window-label"></span>
              <strong class="progress-value progress-window-value"></strong>
            </div>
          </div>
          <div class="progress-visuals">
            <div class="progress-track-group">
              <div class="progress-track-copy">
                <span class="progress-track-label progress-track-window-label"></span>
                <span class="progress-track-meta progress-track-window-meta"></span>
              </div>
              <div class="progress-track">
                <div class="progress-fill progress-window-fill"></div>
              </div>
            </div>
          </div>
        </div>
      </article>
    </template>

    <template id="habit-row-template">
      <article class="habit-row-card">
        <button class="habit-row-button" type="button">
          <div class="habit-row-leading">
            <div class="habit-row-dot"></div>
            <div>
              <h2 class="habit-row-title"></h2>
              <p class="habit-row-meta"></p>
            </div>
          </div>
          <div class="habit-row-trailing">
            <span class="habit-row-status"></span>
            <span class="habit-row-chevron">›</span>
          </div>
        </button>
      </article>
    </template>
    <script type="module" src="/app.js"></script>
  </body>
</html>
