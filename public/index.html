<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HabitAI</title>
    <meta name="theme-color" content="#f0e5d0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HabitAI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-512.png" type="image/png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header id="app-header" class="app-header" data-variant="poster">
        <div class="header-blob" aria-hidden="true"></div>
        <svg class="header-mountains" viewBox="0 0 390 200" preserveAspectRatio="none" aria-hidden="true">
          <path d="M0 140 L 70 80 L 110 110 L 170 60 L 230 100 L 310 50 L 390 110 L 390 200 L 0 200 Z"
            fill="#2d4d35" opacity="0.6"/>
          <path d="M0 170 L 60 130 L 130 155 L 200 120 L 280 150 L 360 125 L 390 145 L 390 200 L 0 200 Z"
            fill="#1a1d2e" opacity="0.85"/>
        </svg>
        <div class="header-copy">
          <div class="header-meta-row">
            <div id="header-kicker" class="header-kicker">Today</div>
            <div class="header-avatar" aria-hidden="true">A</div>
          </div>
          <h1 id="header-title" class="header-title">Good day</h1>
          <p id="header-subtitle" class="header-subtitle" hidden></p>
        </div>
      </header>

      <section id="today-view" class="screen-view"></section>
      <section id="insights-view" class="screen-view" hidden></section>
      <section id="habit-detail-view" class="screen-view" hidden></section>

      <nav class="bottom-nav" aria-label="Primary">
        <button class="bottom-nav-item is-active" data-nav-view="today" type="button">Today</button>
        <button class="bottom-nav-item" data-nav-view="insights" type="button">Insights</button>
        <button
          id="floating-add-button"
          class="floating-add-button"
          type="button"
          aria-label="Add habit"
        >
          <span class="floating-add-plus">+</span>
        </button>
      </nav>
    </main>

    <section id="composer-modal" class="composer-modal" hidden>
      <div id="composer-backdrop" class="composer-backdrop"></div>
      <div class="composer-sheet" role="dialog" aria-modal="true" aria-labelledby="composer-title">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="composer-sheet-header">
          <h2 id="composer-title">A new <em>habit.</em></h2>
        </div>
        <form id="habit-form" class="composer-form">
          <div id="habit-title-field" class="form-field" hidden>
            <label class="field-label" for="habit-title-input">Title</label>
            <input id="habit-title-input" class="text-input" type="text" maxlength="120" />
          </div>
          <label class="sr-only" for="habit-input">Habit description</label>
          <textarea
            id="habit-input"
            rows="4"
            placeholder="Say it the way you'd say it to a friend…"
          ></textarea>
          <div class="composer-actions">
            <button id="habit-submit-button" type="submit" class="primary-button">Save habit ✦</button>
            <p id="composer-feedback" class="composer-feedback" hidden></p>
          </div>
        </form>
      </div>
    </section>

    <section id="log-sheet-modal" class="composer-modal" hidden>
      <div id="log-sheet-backdrop" class="composer-backdrop"></div>
      <div class="composer-sheet log-sheet" role="dialog" aria-modal="true" aria-labelledby="log-sheet-title">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="composer-sheet-header">
          <h2 id="log-sheet-title">Log day</h2>
          <p id="log-sheet-subtitle" class="composer-feedback"></p>
        </div>
        <div class="composer-form log-sheet-actions">
          <button id="log-sheet-done" type="button" class="action-button done-button">Mark done</button>
          <button id="log-sheet-skip" type="button" class="action-button skip-button">Mark skipped</button>
          <button id="log-sheet-clear" type="button" class="action-button">Clear log</button>
          <button id="log-sheet-cancel" type="button" class="action-button">Cancel</button>
        </div>
      </div>
    </section>

    <template id="today-card-template">
      <article class="today-card">
        <div class="swipe-actions" aria-hidden="true">
          <div class="swipe-action swipe-action-done">✓</div>
          <div class="swipe-action swipe-action-skip">✕</div>
        </div>
        <div class="today-card-content">
          <div class="tile">
            <img class="tile-illo" alt="" />
          </div>
          <div class="today-card-body">
            <div class="today-card-cat"></div>
            <h2 class="today-card-title"></h2>
            <p class="today-card-meta"></p>
          </div>
          <div class="today-card-pip"></div>
        </div>
      </article>
    </template>

    <template id="habit-row-template">
      <article class="habit-row-card">
        <button class="habit-row-button" type="button">
          <div class="habit-row-leading">
            <div>
              <h2 class="habit-row-title"></h2>
              <p class="habit-row-meta"></p>
            </div>
          </div>
          <div class="habit-row-trailing">
            <span class="habit-row-status"></span>
          </div>
        </button>
      </article>
    </template>
    <script type="module" src="/app.js"></script>
  </body>
</html>
